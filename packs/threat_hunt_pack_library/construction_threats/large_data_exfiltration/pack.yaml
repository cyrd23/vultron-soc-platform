name: large_data_exfiltration
category: construction_threats
severity: critical
description: Detect large outbound transfers that may indicate data staging or exfiltration, with destination country context

query_template: |
  FROM logs-zeek.conn*
  | STATS
      total_bytes = SUM(network.bytes),
      first_seen = MIN(@timestamp),
      last_seen = MAX(@timestamp)
    BY source.ip, destination.ip, destination.geo.country_name
  | WHERE total_bytes > 100000000
    AND destination.geo.country_name IS NOT NULL
    AND destination.geo.country_name NOT IN ("United States", "Canada")
  | EVAL duration_minutes = DATE_DIFF("minute", first_seen, last_seen)
  | SORT total_bytes DESC
  | LIMIT 100
