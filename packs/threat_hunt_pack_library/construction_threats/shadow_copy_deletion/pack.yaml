name: shadow_copy_deletion
category: construction_threats
severity: critical
description: Detect shadow copy deletion often associated with ransomware activity

query_template: |
  FROM logs-crowdstrike.fdr*
  | WHERE process.command_line LIKE "*vssadmin delete shadows*"
     OR process.command_line LIKE "*wmic shadowcopy delete*"
  | STATS
      events = COUNT(),
      first_seen = MIN(@timestamp),
      last_seen = MAX(@timestamp)
    BY host.name, process.name, process.command_line
  | EVAL duration_minutes = DATE_DIFF("minute", first_seen, last_seen)
  | SORT events DESC
  | LIMIT 100
