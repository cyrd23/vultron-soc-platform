name: encoded_powershell
category: construction_threats
severity: high
description: Detect encoded or suspicious PowerShell execution

query_template: |
  FROM logs-crowdstrike.fdr*
  | WHERE process.name == "powershell.exe"
     OR process.name == "pwsh.exe"
     OR process.command_line LIKE "*powershell*"
  | WHERE process.command_line LIKE "*-enc*"
     OR process.command_line LIKE "*DownloadString*"
     OR process.command_line LIKE "*IEX*"
     OR process.command_line LIKE "*FromBase64String*"
  | STATS
      executions = COUNT(),
      first_seen = MIN(@timestamp),
      last_seen = MAX(@timestamp)
    BY host.name, process.name, process.command_line
  | EVAL duration_minutes = DATE_DIFF("minute", first_seen, last_seen)
  | SORT executions DESC
  | LIMIT 100
