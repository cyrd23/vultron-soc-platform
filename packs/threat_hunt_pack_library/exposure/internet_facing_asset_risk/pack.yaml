name: internet_facing_asset_risk
category: exposure
description: Detect repeated inbound traffic to public-facing assets
severity: high

query_template: |
  FROM logs-fortinet_fortigate.log*
  | STATS hits = COUNT(), src_ips = VALUES(source.ip) BY destination.ip, destination.port, event.action
  | WHERE hits >= 10
  | SORT hits DESC
  | LIMIT 100
