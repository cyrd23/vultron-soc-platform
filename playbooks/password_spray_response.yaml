name: password_spray_response
description: Response workflow for suspected password spray activity.
approval_required: true

actions:
  - name: review_targeted_accounts
    description: Review targeted accounts for lockouts, successful sign-ins, or risk signals
  - name: review_source_ips
    description: Review source IPs for prevalence, ASN, and known bad reputation
  - name: monitor_follow_on_activity
    description: Monitor for successful authentication after failed spray attempts
  - name: consider_temporary_ip_block
    description: Temporarily block malicious source IPs if confirmed
